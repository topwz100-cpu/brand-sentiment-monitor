name: Deploy Backend to Alibaba Cloud

on:
  push:
    branches: [ main, master ]
    paths:
      - 'backend/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v3
      
    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.7.0
      with:
        ssh-private-key: ${{ secrets.ALIYUN_SSH_KEY }}
        
    - name: Add host to known_hosts
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -H ${{ secrets.ALIYUN_HOST }} >> ~/.ssh/known_hosts
        
    - name: Deploy to Alibaba Cloud
      env:
        HOST: ${{ secrets.ALIYUN_HOST }}
        USER: ${{ secrets.ALIYUN_USER }}
      run: |
        # 复制代码到服务器
        rsync -avz --exclude='.git' --exclude='node_modules' --exclude='__pycache__' \
          ./ $USER@$HOST:/opt/brand-sentiment-monitor/
        
        # 在服务器上执行部署
        ssh $USER@$HOST << 'EOF'
          cd /opt/brand-sentiment-monitor
          
          # 创建环境变量文件
          cat > .env << EOL
        DATABASE_URL=${{ secrets.DATABASE_URL }}
        REDIS_URL=${{ secrets.REDIS_URL }}
        TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }}
        DINGTALK_WEBHOOK=${{ secrets.DINGTALK_WEBHOOK }}
        EOL
          
          # 重启服务
          docker-compose down
          docker-compose up -d --build
          
          # 清理旧镜像
          docker image prune -f
        EOF
